<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste de Segurança — Defesa Digital</title>
  <meta name="description" content="Teste seus conhecimentos sobre golpes digitais e descubra como se proteger melhor.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/quiz.css">
  <style>
    html, body { height: auto; overflow: auto; }
    body { display: flex; flex-direction: column; min-height: 100dvh; }

    .quiz-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-soft);
      padding: var(--space-5) var(--space-6) var(--space-10);
      gap: var(--space-5);
    }

    /* ── Topbar ── */
    .quiz-topbar {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      max-width: 780px;
      width: 100%;
      margin-inline: auto;
    }
    .quiz-page-back {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .quiz-page-back:hover { color: var(--primary); }
    .quiz-topbar-title {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }
    .quiz-progress-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .quiz-bar-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .quiz-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: var(--radius-full);
      transition: width 0.45s ease;
    }
    .quiz-progress-label {
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 700;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* ── Corpo central ── */
    .quiz-body {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      width: 100%;
      max-width: 780px;
      margin-inline: auto;
    }

    /* ── Card genérico ── */
    .quiz-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    /* ── Card de simulação ── */
    .quiz-sim-card {
      display: flex;
      flex-direction: column;
    }

    /* Topo do card: badge de categoria */
    .quiz-sim-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-5);
      border-bottom: 1px solid var(--border);
      background: var(--bg-soft);
    }
    .quiz-cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 11px;
      border-radius: var(--radius-full);
      background: var(--primary-light);
      color: var(--primary-dark);
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .quiz-sim-label {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-left: auto;
    }

    /* Conteúdo da simulação */
    .quiz-sim-content {
      padding: var(--space-4) var(--space-5);
    }

    /* ── Card de pergunta ── */
    .quiz-question-card {
      padding: var(--space-5) var(--space-6);
    }
    .quiz-question-text {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text);
      line-height: 1.65;
    }
    .sim-prompt {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--text);
    }

    /* ── Opções ── */
    .quiz-options-card { padding: var(--space-4) var(--space-5); }
    .quiz-options { display: flex; flex-direction: column; gap: var(--space-2); }
    .quiz-opt {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--bg-soft);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text);
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.5;
      width: 100%;
    }
    .quiz-opt:hover:not(:disabled) {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .quiz-opt-letter {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .quiz-opt.correct { border-color: var(--success); background: var(--success-bg); color: var(--success); }
    .quiz-opt.correct .quiz-opt-letter { background: var(--success); color: #fff; }
    .quiz-opt.wrong   { border-color: var(--danger);  background: var(--danger-bg);  color: var(--danger); }
    .quiz-opt.wrong   .quiz-opt-letter { background: var(--danger);  color: #fff; }
    .quiz-opt:disabled { cursor: not-allowed; opacity: 0.85; }

    /* ── Feedback ── */
    .quiz-feedback-card {
      padding: var(--space-4) var(--space-5);
      display: none;
    }
    .quiz-feedback-card.correct {
      background: var(--success-bg);
      border-top: 3px solid var(--success);
      display: block;
    }
    .quiz-feedback-card.wrong {
      background: var(--danger-bg);
      border-top: 3px solid var(--danger);
      display: block;
    }
    .quiz-feedback-title {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .quiz-feedback-card.correct .quiz-feedback-title { color: var(--success); }
    .quiz-feedback-card.wrong   .quiz-feedback-title { color: var(--danger); }
    .quiz-feedback-text {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* ── Botão próxima ── */
    .quiz-bottom {
      display: flex;
      justify-content: flex-end;
      padding: var(--space-3) var(--space-5);
      border-top: 1px solid var(--border);
      background: var(--surface);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .quiz-btn-next {
      display: none;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius);
      background: var(--primary);
      color: #fff;
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .quiz-btn-next:hover { background: var(--primary-dark); }

    /* ── Resultado ── */
    .quiz-result {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-10) var(--space-6);
      gap: var(--space-4);
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 780px;
      margin-inline: auto;
    }
    .quiz-result-ring { position: relative; width: 140px; height: 140px; }
    .quiz-result-ring svg { transform: rotate(-90deg); }
    .ring-bg   { fill: none; stroke: var(--border); stroke-width: 10; }
    .ring-fill {
      fill: none; stroke: var(--primary); stroke-width: 10; stroke-linecap: round;
      stroke-dasharray: 345.4; stroke-dashoffset: 345.4;
      transition: stroke-dashoffset 1s ease, stroke 0.3s;
    }
    .ring-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--text);
    }
    .quiz-result-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: var(--radius-full);
      color: #fff;
      font-family: var(--font-display);
      font-size: var(--text-sm);
      font-weight: 700;
    }
    .quiz-result-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 800;
      color: var(--text);
    }
    .quiz-result-msg {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 52ch;
    }
    .quiz-result-score {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--primary);
    }
    .quiz-result-actions {
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
      margin-top: var(--space-2);
    }

    /* ── Animações ── */
    @keyframes fadeSlideIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeSlideOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-10px); } }
    .quiz-body.animating-in  { animation: fadeSlideIn  0.25s ease forwards; }
    .quiz-body.animating-out { animation: fadeSlideOut 0.2s  ease forwards; }

    /* ── Controles de fonte ── */
    .font-controls { display: flex; align-items: center; gap: 6px; }
    .font-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--bg-soft);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .font-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .quiz-page { padding: var(--space-4); }
      .quiz-topbar, .quiz-body, .quiz-result { max-width: 100%; }
      .quiz-topbar-title { display: none; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">
    <div class="logo-icon" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <div class="logo-text">
      Defesa Digital
      <small>Segurança para Todos</small>
    </div>
  </a>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="font-controls" aria-label="Tamanho da fonte">
      <button class="font-btn" onclick="changeFontSize(-1)" aria-label="Diminuir fonte" title="Diminuir fonte">A−</button>
      <button class="font-btn" onclick="changeFontSize(1)"  aria-label="Aumentar fonte" title="Aumentar fonte">A+</button>
    </div>
  </div>
</header>

<main class="quiz-page">

  <!-- Topbar: voltar + título + progresso -->
  <div class="quiz-topbar">
    <a href="index.html" class="quiz-page-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="11 6 5 12 11 18"/></svg>
      Voltar
    </a>
    <span class="quiz-topbar-title">Teste de Segurança Digital</span>
    <div class="quiz-progress-wrap">
      <div class="quiz-bar-track">
        <div class="quiz-bar-fill" id="quiz-bar-fill" style="width:10%"></div>
      </div>
      <span class="quiz-progress-label" id="quiz-top-label">1 / 10</span>
    </div>
  </div>

  <!-- Corpo do quiz -->
  <div class="quiz-body" id="quiz-body">

    <!-- Card de simulação: badge no topo + conteúdo -->
    <div class="quiz-card quiz-sim-card" id="quiz-sim-card">
      <div class="quiz-sim-header">
        <span class="quiz-cat-badge" id="quiz-cat"></span>
        <span class="quiz-sim-label" id="quiz-sim-label">Simulação</span>
      </div>
      <div class="quiz-sim-content" id="quiz-sim-content"></div>
    </div>

    <!-- Pergunta -->
    <div class="quiz-card quiz-question-card">
      <div class="quiz-question-text" id="quiz-q-text"></div>
    </div>

    <!-- Opções -->
    <div class="quiz-card quiz-options-card">
      <div class="quiz-options" id="quiz-options"></div>
    </div>

    <!-- Feedback -->
    <div class="quiz-card quiz-feedback-card" id="quiz-feedback">
      <div class="quiz-feedback-title" id="quiz-feedback-title"></div>
      <div class="quiz-feedback-text"  id="quiz-feedback-text"></div>
    </div>

    <!-- Botão próxima -->
    <div class="quiz-bottom" id="quiz-bottom">
      <button class="quiz-btn-next" id="quiz-btn-next" onclick="nextQuestion()">
        Próxima
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
      </button>
    </div>

  </div><!-- /quiz-body -->

  <!-- Tela de resultado -->
  <div class="quiz-result" id="quiz-result-screen">
    <div class="quiz-result-ring">
      <svg viewBox="0 0 120 120" width="140" height="140">
        <circle class="ring-bg"   cx="60" cy="60" r="55"/>
        <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="55"/>
      </svg>
      <div class="ring-text" id="ring-pct">0%</div>
    </div>
    <div class="quiz-result-badge" id="quiz-result-badge"></div>
    <div class="quiz-result-title" id="quiz-result-title"></div>
    <div class="quiz-result-msg"   id="quiz-result-msg"></div>
    <p class="quiz-result-score"   id="quiz-result-score"></p>
    <div class="quiz-result-actions">
      <button class="btn btn-primary" onclick="restartQuiz()">Tentar Novamente</button>
      <a class="btn btn-outline" href="dicas.html">Ver Dicas de Proteção</a>
    </div>
  </div>

</main>

<footer class="site-footer">
  <strong>Defesa Digital</strong> — Projeto Extensionista · UNINTER 2026
  <div class="footer-divider"></div>
  Tecnologia Aplicada à Inclusão Digital · Ciência da Computação
</footer>

<script src="js/data.js"></script>
<script src="js/quiz-page.js"></script>
<script>
  let fontSize = 100;
  function changeFontSize(dir) {
    fontSize = Math.min(140, Math.max(80, fontSize + dir * 10));
    document.documentElement.style.fontSize = fontSize + '%';
  }
</script>
</body>
</html>
