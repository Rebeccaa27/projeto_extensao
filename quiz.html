<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste de Segurança — Defesa Digital</title>
  <meta name="description" content="Teste seus conhecimentos sobre golpes digitais e descubra como se proteger melhor.">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<header class="site-header">
  <a class="logo" href="index.html">
    <div class="logo-icon" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <div class="logo-text">
      Defesa Digital
      <small>Segurança para Todos</small>
    </div>
  </a>
  <div class="header-actions">
    <div class="font-controls" aria-label="Tamanho da fonte">
      <button class="font-btn" onclick="changeFontSize(-1)" aria-label="Diminuir fonte" title="Diminuir fonte">A−</button>
      <button class="font-btn" onclick="changeFontSize(1)"  aria-label="Aumentar fonte" title="Aumentar fonte">A+</button>
    </div>
  </div>
</header>

<main class="quiz-page">

  <!-- Topbar: voltar + título + progresso -->
  <div class="quiz-topbar">
    <a href="index.html" class="quiz-page-back" aria-label="Voltar para a página inicial">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="11 6 5 12 11 18"/></svg>
      Voltar
    </a>
    <span class="quiz-topbar-title">Teste de Segurança Digital</span>
    <div class="quiz-progress-wrap">
      <div class="quiz-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="10">
        <div class="quiz-bar-fill" id="quiz-bar-fill" style="width:10%"></div>
      </div>
      <span class="quiz-progress-label" id="quiz-top-label">1 / 10</span>
    </div>
  </div>

  <!-- Corpo do quiz -->
  <div class="quiz-body" id="quiz-body">

    <!-- Card de simulação -->
    <div class="quiz-sim-card" id="quiz-sim-card">
      <div class="quiz-sim-header">
        <span class="quiz-cat-badge" id="quiz-cat"></span>
        <span class="quiz-sim-tag">Situação real</span>
      </div>
      <div class="quiz-sim-content" id="quiz-sim-content"></div>
    </div>

    <!-- Pergunta -->
    <div class="quiz-question-card">
      <div class="quiz-question-text" id="quiz-q-text"></div>
    </div>

    <!-- Opções -->
    <div class="quiz-options-card">
      <div class="quiz-options" id="quiz-options" role="group" aria-label="Escolha uma resposta"></div>
    </div>

    <!-- Feedback -->
    <div class="quiz-feedback-card" id="quiz-feedback" role="alert" aria-live="polite">
      <div class="quiz-feedback-title" id="quiz-feedback-title"></div>
      <div class="quiz-feedback-text"  id="quiz-feedback-text"></div>
    </div>

    <!-- Rodapé com botão -->
    <div class="quiz-bottom" id="quiz-bottom">
      <button class="quiz-btn-next" id="quiz-btn-next" onclick="nextQuestion()">
        Próxima
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
      </button>
    </div>

  </div><!-- /quiz-body -->

  <!-- Tela de resultado -->
  <div class="quiz-result" id="quiz-result-screen" role="region" aria-label="Resultado do teste">
    <div class="quiz-result-ring">
      <svg viewBox="0 0 120 120" width="140" height="140" aria-hidden="true">
        <circle class="ring-bg"   cx="60" cy="60" r="55"/>
        <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="55"/>
      </svg>
      <div class="ring-text" id="ring-pct">0%</div>
    </div>
    <div class="quiz-result-badge" id="quiz-result-badge"></div>
    <div class="quiz-result-title" id="quiz-result-title"></div>
    <div class="quiz-result-msg"   id="quiz-result-msg"></div>
    <p class="quiz-result-score"   id="quiz-result-score"></p>
    <div class="quiz-result-actions">
      <button class="btn btn-primary" onclick="restartQuiz()">Tentar Novamente</button>
      <a class="btn btn-outline" href="dicas.html">Ver Dicas de Proteção</a>
    </div>
  </div>

</main>

<footer class="site-footer">
  <strong>Defesa Digital</strong> — Projeto Extensionista · UNINTER 2026
  <div class="footer-divider"></div>
  Tecnologia Aplicada à Inclusão Digital · Ciência da Computação
</footer>

<script src="js/data.js"></script>
<script src="js/quiz-page.js"></script>
<script>
  let fontSize = 100;
  function changeFontSize(dir) {
    fontSize = Math.min(140, Math.max(80, fontSize + dir * 10));
    document.documentElement.style.fontSize = fontSize + '%';
  }
</script>
</body>
</html>
